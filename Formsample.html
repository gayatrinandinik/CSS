<!DOCTYPE html>
<html>
    <head>
        <title>Form Sample </title>
        <link rel="stylesheet" href="Formsample.css">
    </head>
    <body class="box">
        <div class="display">
        <h1 >Say Hello</h1>
        <label><b>Your Name</b></label>
        <br>
        <input type="text" placeholder="Enter your name">
        <hr>
        <label><b>Email</b></label>
        <br>
        <input type="text" placeholder="Enter your email address">
        <hr>
        <label>Needed Services</label>
        <br>
        <label><b>choose a service:</b></label>
        <select>
            <option>Cooking Services</option>
            <option>Cleaning Services</option>
            <option>Bike Services</option>
            <option>Car Services</option>
        </select>
        <hr>
        <label>Budget</label>
        <br>
        <label><b>Select Budget:</b></label>
        <select>
            <option>1000</option>
            <option>2000</option>
            <option>3000</option>
            <option>4000</option>
        </select>
        <hr>
        <label><b>Message:</b></label>
        <br>
        <textarea placeholder="Enter your message"></textarea>
        <hr>
        <div class="container">
        <button id="btnSubmit" >Submit</button>
        </div>
        </div>
    </body>
</html>
